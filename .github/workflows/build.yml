name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
        continue-on-error: true

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: BabaSitaRam-Pro-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: BabaSitaRam-Pro-Release-APK
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
          if-no-files-found: ignore

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v5.0-build-${{ github.run_number }}
          name: "BabaSitaRam Pro Android v5.0 — Build ${{ github.run_number }}"
          body: |
            ## BabaSitaRam Pro Android v5.0
            
            ### ✅ Features:
            - System-wide AutoFill (sabhi apps)
            - Biometric Face/Fingerprint unlock
            - AES-256-GCM Encryption
            - BSR-PRO-v5 Backup format (.bsrpro)
            - Cross-platform: Extension ↔ APK backup
            - Password Generator + Health Check
            - Categories + Favorites
            
            ### 📲 Install:
            1. `BabaSitaRam-Pro-Debug-APK` download karo
            2. Settings → Unknown sources ON
            3. APK install karo
            4. Settings → AutoFill → BSR Pro select karo
          files: app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
