name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.2
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Find APK
        run: find . -name "*.apk" -type f

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: BabaSitaRam-Pro-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v5.0-build-${{ github.run_number }}
          name: "BabaSitaRam Pro Android v5.0 — Build ${{ github.run_number }}"
          body: |
            ## BabaSitaRam Pro Android v5.0
            ✅ AutoFill (sabhi apps)
            ✅ Biometric Face/Fingerprint  
            ✅ AES-256-GCM Encryption
            ✅ BSR-PRO-v5 Backup (.bsrpro)
            ✅ Password Generator + Health

            📲 Install: APK download karo → Unknown sources ON → Install → Settings mein AutoFill → BSR Pro select karo
          files: app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
